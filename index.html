<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pakkliste Lag-NM Golf - Firebase stabil</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="topbar">
  <div>
    <h1>🏌️ Pakkliste Lag-NM</h1>
    <p>Stabil versjon med Firebase</p>
  </div>
  <button onclick="toggleAdmin()">Admin</button>
</header>

<main class="container">
  <div id="status" class="status">Starter app...</div>

  <section class="card">
    <h2>Spillere</h2>
    <select id="playerSelect" onchange="selectPlayer()"></select>
    <div id="playerInfo" class="playerInfo"></div>
  </section>

  <section class="card">
    <h2>Pakkliste</h2>
    <div id="packingList"></div>
  </section>

  <section id="adminPanel" class="card admin hidden">
    <h2>🔐 Admin</h2>

    <div class="adminGrid">
      <div>
        <h3>Legg til spiller</h3>
        <input id="name" placeholder="Navn på spiller">
        <input id="pin" placeholder="PIN (valgfritt)">
        <button onclick="addPlayer()">Legg til spiller</button>
      </div>

      <div>
        <h3>Legg til pakkepunkt</h3>
        <input id="newItem" placeholder="F.eks. Badetøy">
        <button onclick="addItem()">Legg til punkt</button>
      </div>
    </div>

    <hr>

    <h3>Admin - spillere</h3>
    <div id="adminPlayers"></div>

    <h3>Admin - pakkepunkter</h3>
    <div id="adminItems"></div>
  </section>
</main>

<footer>
  Lag-NM Golf pakkliste • GitHub Pages + Firebase
</footer>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
<script src="firebase.js"></script>
<script src="app.js"></script>
</body>
</html>
